services:
  redis:
    image: redis:7-alpine
    ports:
      - "6739:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mive}
      POSTGRES_DB: ${POSTGRES_DB:-mive}
    ports:
      - "5532:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mive"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mive:mive@postgres:5432/mive
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # Matterbridge: bridges chat platforms (Discord, Telegram, Slack, etc.) to MIVE
  # ---------------------------------------------------------------------------
  matterbridge:
    build:
      context: .
      dockerfile: docker/matterbridge.dockerfile
    restart: unless-stopped
    ports:
      # REST API port (MIVE connects here)
      - "${MATTERBRIDGE_API_PORT:-4242}:4242"
    volumes:
      # Mount the Matterbridge config file
      - ./config/matterbridge.toml:/etc/matterbridge/matterbridge.toml:ro
    environment:
      # API token for MIVE to authenticate with Matterbridge
      # Must match MATTERBRIDGE_API_TOKEN in .env
      MATTERBRIDGE_API_TOKEN: ${MATTERBRIDGE_API_TOKEN}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4242/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - backend

volumes:
  pgdata:
